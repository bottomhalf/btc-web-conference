<div class="login-page">
  <!-- ======== ANIMATED BG CANVAS ======== -->
  <div class="global-bg-animation">
    <div class="wave wave-1"></div>
    <div class="wave wave-2"></div>
    <div class="wave wave-3"></div>
    <div class="floating-shape shape-1"></div>
    <div class="floating-shape shape-2"></div>
    <div class="floating-shape shape-3"></div>
    <div class="floating-shape shape-4"></div>
    <div class="floating-shape shape-5"></div>
  </div>

  <div class="login-container">
    <div class="login-card reveal revealed">
      <div class="login-header">
        <div class="brand-logo mb-3">
          <svg viewBox="0 0 40 40" fill="none">
            <rect x="4" y="12" width="22" height="16" rx="3" fill="url(#loginGrad)"/>
            <polygon points="28,15 36,11 36,29 28,25" fill="url(#loginGrad)" opacity="0.8"/>
            <circle cx="15" cy="20" r="2.5" fill="#fff" opacity="0.9"/>
            <defs>
              <linearGradient id="loginGrad" x1="0" y1="0" x2="40" y2="40">
                <stop offset="0%" stop-color="#818cf8"/>
                <stop offset="100%" stop-color="#c084fc"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h2 class="login-title">Welcome Back</h2>
        <p class="login-subtitle">Sign in to continue to Confeet</p>
      </div>

      <div class="social-login">
        <button type="button" class="btn-social">
          <i class="fab fa-google"></i>
          <span>Continue with Google</span>
        </button>
      </div>

      <div class="divider">
        <span>OR</span>
      </div>

      <div class="login-form">
        <!-- Email Input -->
        <div class="form-group">
          <label>Email Address</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" placeholder="john@company.com" class="form-control-dark"
                [(ngModel)]="email" (input)="isValidEmail()"
                [ngClass]="{ 'is-invalid': isSubmitted && (email == '' || !isEmailValid) }" />
          </div>
          <div class="error-msg" *ngIf="isSubmitted && email == ''">Email is required</div>
          <div class="error-msg" *ngIf="isSubmitted && email != '' && !isEmailValid">Please enter a valid email</div>
        </div>

        <!-- Password Input -->
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input [type]="passwordType" placeholder="Enter your password"
                class="form-control-dark" [(ngModel)]="password"
                (keyup.enter)="login()" [ngClass]="{ 'is-invalid': isSubmitted && password == '' }" />
            <i class="fas toggle-pwd" [ngClass]="{
                    'fa-eye-slash': passwordType == 'password',
                    'fa-eye': passwordType == 'text'
                }" (click)="viewPassword()"></i>
          </div>
          <div class="error-msg" *ngIf="isSubmitted && password == ''">Password is required</div>
        </div>

        <!-- Remember Me & Forgot Password -->
        <div class="form-options">
          <div class="custom-checkbox">
            <input type="checkbox" [(ngModel)]="rememberMe" id="rememberMe" />
            <label for="rememberMe">Remember me</label>
          </div>
          <a href="javascript:void(0)" class="forgot-link">Forgot Password?</a>
        </div>

        <!-- Login Button -->
        <button class="btn-login-primary" [disabled]="isLoading" (click)="login()">
          <span *ngIf="!isLoading">Sign In</span>
          <span *ngIf="isLoading"><i class="fas fa-spinner fa-spin me-2"></i>Signing In...</span>
        </button>
      </div>

      <div class="login-footer">
        <p>Don't have an account? <a href="javascript:void(0)">Create one</a></p>
      </div>
    </div>
  </div>
</div>
